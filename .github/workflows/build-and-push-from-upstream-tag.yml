name: Build and Push from agendav/agendav Tag

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream agendav/agendav tag to build (optional)"
        required: false
        type: string
  repository_dispatch:
    types:
      - agendav-new-tag

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Resolve target tag
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          PAYLOAD_TAG: ${{ github.event.client_payload.tag }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_TAG:-}" ]]; then
            TAG="${INPUT_TAG}"
          elif [[ -n "${PAYLOAD_TAG:-}" ]]; then
            TAG="${PAYLOAD_TAG}"
          else
            TAG="$(git ls-remote --tags --refs https://github.com/agendav/agendav.git | awk -F'/' '{print $3}' | sort -V | tail -n1)"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "No tag could be resolved from agendav/agendav."
            exit 1
          fi

          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/agendav"
          SOURCE_TAG_URL="https://github.com/agendav/agendav/releases/tag/${TAG}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "source_tag_url=${SOURCE_TAG_URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"
          echo "Target image: ${IMAGE}"

      - name: Check if image tag already exists in GHCR
        id: exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.resolve.outputs.image }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail

          REPO="${IMAGE#ghcr.io/}"
          GHCR_TOKEN=$(curl -fsSL \
            -u ":${GH_TOKEN}" \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:${REPO}:pull" \
            | jq -r .token)

          MANIFEST_URL="https://ghcr.io/v2/${REPO}/manifests/${TAG}"

          if curl -fsSI \
            -H "Authorization: Bearer ${GHCR_TOKEN}" \
            -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            "${MANIFEST_URL}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image ${IMAGE}:${TAG} already exists. Skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image ${IMAGE}:${TAG} not found. Build will run."
          fi

      - name: Checkout agendav/agendav at tag
        if: steps.exists.outputs.exists != 'true'
        uses: actions/checkout@v4
        with:
          repository: agendav/agendav
          ref: refs/tags/${{ steps.resolve.outputs.tag }}
          path: source

      - name: Set up Docker Buildx
        if: steps.exists.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.exists.outputs.exists != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local image for smoke test
        if: steps.exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./source
          file: ./Dockerfile
          load: true
          tags: agendav-smoke:local

      - name: Smoke test image startup
        id: smoke
        if: steps.exists.outputs.exists != 'true'
        run: |
          set -euo pipefail

          docker compose -f .github/docker-compose.smoke.yml up -d

          docker compose -f .github/docker-compose.smoke.yml exec -T web php -m | grep -Fx intl
          docker compose -f .github/docker-compose.smoke.yml exec -T web php -m | grep -Fx zip
          docker compose -f .github/docker-compose.smoke.yml exec -T web php /app/bin/agendavcli migrations:migrate --no-interaction
          docker compose -f .github/docker-compose.smoke.yml exec -T web chown -R www-data:www-data /app/var

          for i in {1..12}; do
            HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/login || true)"
            if [[ "${HTTP_CODE}" =~ ^(2|3)[0-9][0-9]$ ]]; then
              echo "Smoke test passed: container is serving HTTP (status ${HTTP_CODE})"
              exit 0
            fi
            sleep 5
          done

          echo "Smoke test failed: web did not become ready in time"
          exit 1

      - name: Dump smoke test logs
        if: steps.smoke.conclusion != 'skipped'
        run: docker compose -f .github/docker-compose.smoke.yml logs --no-color

      - name: Tear down smoke test stack
        if: steps.smoke.conclusion != 'skipped'
        run: docker compose -f .github/docker-compose.smoke.yml down -v

      - name: Build and push image
        if: steps.exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./source
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.resolve.outputs.image }}:${{ steps.resolve.outputs.tag }}
            ${{ steps.resolve.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/agendav/agendav
            org.opencontainers.image.url=https://github.com/agendav/agendav
            org.opencontainers.image.version=${{ steps.resolve.outputs.tag }}
            org.opencontainers.image.documentation=${{ steps.resolve.outputs.source_tag_url }}
            org.opencontainers.image.ref.name=${{ steps.resolve.outputs.tag }}
